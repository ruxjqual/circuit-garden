<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#12181f">
    <title>Puzzle Arcade</title>
    <link rel="stylesheet" href="home.css">

  <body>
    <main class="hub">
      <header class="masthead">
        <div>

        </div>
      </header>

      <section class="games" aria-label="Game links">

            <em id="homeSchoolDays">距离开学 -- 天</em>
          </div>
          <div class="card-copy">
            <p class="tag">Clock / 时钟</p>
            <h2>时间与开学倒计时</h2>
            <!-- <p>北京时间、美西时间、距离 8/13 开学的实时倒计时。</p> -->
            <strong>Open/打开</strong>
          </div>
        </a>

        <a class="game-card active" href="circuit-garden/" aria-label="Play Circuit Garden">
          <div class="preview circuit-preview" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="card-copy">
            <p class="tag">Playable / 可玩</p>
            <h2>电路板</h2>
            <strong>Play now/开始游戏</strong>
          </div>
        </a>

        <a class="game-card active" href="number-game/" aria-label="Play Number Loom">
          <div class="preview number-preview" aria-hidden="true">
            <span>4</span>
            <span>9</span>
            <span>1</span>
            <span>6</span>
          </div>
          <div class="card-copy">
            <p class="tag">Playable / 可玩</p>
            <h2>数字华容道</h2>
            <strong>Play now/开始游戏</strong>
          </div>
        </a>

        <a class="game-card active" href="jigsaw-20/" aria-label="Play 20 x 20 picture puzzle">
          <div class="preview jigsaw-preview" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="card-copy">
            <p class="tag">Playable / 可玩</p>
            <h2>星河拼图</h2>
            <!-- <p>Swap 400 picture pieces back into a complete drawing.</p> -->
            <strong>Play now/开始游戏</strong>
          </div>
        </a>

        <a class="game-card active" href="jigsaw-50/" aria-label="Play 50 piece tabletop jigsaw">
          <div class="preview tabletop-preview" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="card-copy">
            <p class="tag">Playable / 可玩</p>
            <h2>桌面拼图</h2>
            <!-- <p>Drag floating pieces into the center to complete the picture.</p> -->
            <strong>Play now/开始游戏</strong>
          </div>
        </a>
      </section>
    </main>

    <script>
      const homeClockFormatters = {
        beijing: new Intl.DateTimeFormat("en-GB", {
          timeZone: "Asia/Shanghai",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false,
          hourCycle: "h23"
        }),
        west: new Intl.DateTimeFormat("en-GB", {
          timeZone: "America/Los_Angeles",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false,
          hourCycle: "h23"
        })
      };

      function homeZoneParts(date, timeZone) {
        const parts = new Intl.DateTimeFormat("en-CA", {
          timeZone,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false,
          hourCycle: "h23"
        }).formatToParts(date);
        return Object.fromEntries(parts.filter((part) => part.type !== "literal").map((part) => [part.type, Number(part.value)]));
      }

      function homeZonedDateTimeToInstant({ year, month, day, hour = 0, minute = 0, second = 0 }, timeZone) {
        let instant = new Date(Date.UTC(year, month - 1, day, hour, minute, second));
        for (let i = 0; i < 3; i += 1) {
          const parts = homeZoneParts(instant, timeZone);
          const asUtc = Date.UTC(parts.year, parts.month - 1, parts.day, parts.hour, parts.minute, parts.second);
          const wantedUtc = Date.UTC(year, month - 1, day, hour, minute, second);
          instant = new Date(instant.getTime() + wantedUtc - asUtc);
        }
        return instant;
      }

      function homeSchoolStart(now) {
        const zone = "America/Los_Angeles";
        const parts = homeZoneParts(now, zone);
        let targetYear = parts.year;
        let instant = homeZonedDateTimeToInstant({ year: targetYear, month: 8, day: 13 }, zone);
        if (now >= instant) {
          targetYear += 1;
          instant = homeZonedDateTimeToInstant({ year: targetYear, month: 8, day: 13 }, zone);
        }
        return instant;
      }

      function updateHomeClock() {
        const now = new Date();
        document.getElementById("homeBeijingTime").textContent = homeClockFormatters.beijing.format(now);
        document.getElementById("homeWestTime").textContent = homeClockFormatters.west.format(now);
        const schoolStart = homeSchoolStart(now);
        const days = Math.max(0, Math.floor((schoolStart.getTime() - now.getTime()) / 86400000));
        document.getElementById("homeSchoolDays").textContent = `距离开学 ${days} 天`;
      }

      updateHomeClock();
      window.setInterval(updateHomeClock, 1000);
    </script>
  </body>
</html>
