<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#12181f">
    <title>常用链接</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f6f1e8;
        --muted: #b8c3c1;
        --bg: #12181f;
        --panel: rgba(27, 37, 43, 0.88);
        --line: rgba(246, 241, 232, 0.13);
        --green: #55d69c;
        --gold: #ffcf56;
        --blue: #84a8ff;
        --shadow: rgba(0, 0, 0, 0.32);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(140deg, rgba(85, 214, 156, 0.14), transparent 34rem),
          linear-gradient(315deg, rgba(132, 168, 255, 0.14), transparent 30rem),
          var(--bg);
      }

      main {
        width: min(840px, calc(100vw - 28px));
        min-height: 100vh;
        margin: 0 auto;
        padding: clamp(22px, 5vw, 56px) 0;
        display: grid;
        align-content: center;
        gap: 22px;
      }

      .home {
        min-height: 38px;
        width: fit-content;
        display: inline-grid;
        place-items: center;
        border: 1px solid var(--line);
        padding: 0 12px;
        color: var(--ink);
        background: rgba(246, 241, 232, 0.08);
        font-weight: 700;
        text-decoration: none;
      }

      .home:hover {
        background: rgba(246, 241, 232, 0.16);
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      .eyebrow {
        color: var(--green);
        font-size: 0.78rem;
        font-weight: 850;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin-top: 5px;
        font-size: clamp(2.6rem, 8vw, 5.5rem);
        line-height: 0.92;
        letter-spacing: 0;
      }

      .section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 24px 70px var(--shadow);
        overflow: hidden;
      }

      .section h2 {
        padding: 18px 20px;
        border-bottom: 1px solid var(--line);
        color: var(--gold);
        font-size: 1rem;
      }

      .links {
        display: grid;
      }

      .links a {
        display: grid;
        gap: 5px;
        padding: 18px 20px;
        border-bottom: 1px solid var(--line);
        color: inherit;
        text-decoration: none;
      }

      .links a:last-child {
        border-bottom: 0;
      }

      .links a:hover {
        background: rgba(246, 241, 232, 0.08);
      }

      .links strong {
        color: var(--blue);
        font-size: 1.15rem;
      }

      .links span {
        color: var(--muted);
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <a class="home" href="../../" aria-label="Home / 回大厅">Home / 回大厅</a>

      <header>
        <p class="eyebrow">Useful Links / 常用链接</p>
        <h1>学校工具</h1>
      </header>

      <section class="section" aria-labelledby="utils-title">
        <h2 id="utils-title">Utils / 工具</h2>
        <div class="links">
          <a href="https://speed.cloudflare.com" target="_blank" rel="noopener noreferrer">
            <strong>Cloudflare Speed Test</strong>
            <span>测速</span>
          </a>
          <a href="https://myip.ipip.net" target="_blank" rel="noopener noreferrer">
            <strong>myip.ipip.net</strong>
            <span>查看IP地址。</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
