<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>记忆翻牌</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #14213d;
      color: #f7f1e3;
      font-family: Arial, sans-serif;
    }

    main {
      width: min(92vw, 640px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }

    .status {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      color: #d9e2ec;
      font-size: 15px;
    }

    .controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
      color: #d9e2ec;
      font-size: 15px;
    }

    .set-button {
      border: 2px solid #f7f1e3;
      background: #274c77;
      color: #f7f1e3;
      padding: 6px 10px;
      font: 700 15px Arial, sans-serif;
      cursor: pointer;
    }

    .set-button.active {
      background: #fca311;
      color: #14213d;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }

    .card {
      aspect-ratio: 1;
      border: 2px solid #f7f1e3;
      background: #274c77;
      color: #f7f1e3;
      font: 700 30px Arial, sans-serif;
      cursor: pointer;
    }

    .card:disabled {
      cursor: default;
    }

    .card.open,
    .card.matched {
      background: #fca311;
      color: #14213d;
    }

    p {
      margin: 12px 0 0;
      color: #d9e2ec;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>记忆翻牌</h1>
    <div class="status" aria-live="polite">
      <span id="moves">步数 0</span>
      <span id="matches">配对 0/18</span>
    </div>
    <div class="controls">
      <span>卡牌类型</span>
      <button class="set-button" type="button" data-set="shapes">形状</button>
      <button class="set-button" type="button" data-set="chemistry">化学</button>
      <button class="set-button" type="button" data-set="numbers">数字</button>
      <button class="set-button active" type="button" data-set="surnames" aria-pressed="true">姓氏</button>
    </div>
    <div id="board" class="board" aria-label="记忆翻牌棋盘"></div>
    <p>每次翻开两张牌，找出所有配对。按空格重新开始。</p>
  </main>

  <script>
    const board = document.getElementById("board");
    const movesText = document.getElementById("moves");
    const matchesText = document.getElementById("matches");
    const setButtons = document.querySelectorAll(".set-button");
    const sets = {
      shapes: ["●", "■", "▲", "◆", "★", "✚", "⬟", "⬢", "○", "□", "△", "◇", "✦", "✖", "⬠", "⬡", "◐", "◧"],
      chemistry: ["H", "He", "Li", "Be", "B", "C", "N", "O", "F", "Ne", "Na", "Mg", "Al", "Si", "P", "S", "Cl", "Ar", "K", "Ca", "Sc", "Ti", "V", "Cr", "Mn", "Fe", "Co", "Ni", "Cu", "Zn", "Ga", "Ge", "As", "Se", "Br", "Kr"],
      surnames: ["王", "李", "张", "刘", "陈", "杨", "黄", "赵", "吴", "周", "徐", "孙", "马", "朱", "胡", "郭", "何", "林", "高", "罗", "郑", "梁", "谢", "宋", "唐", "许", "邓", "冯", "韩", "曹", "曾", "彭", "萧", "蔡", "潘", "田"]
    };
    const pairCount = 18;
    let cards = [];
    let first = null;
    let second = null;
    let locked = false;
    let moves = 0;
    let matches = 0;
    let currentSet = "surnames";

    function shuffle(items) {
      for (let index = items.length - 1; index > 0; index -= 1) {
        const swap = Math.floor(Math.random() * (index + 1));
        [items[index], items[swap]] = [items[swap], items[index]];
      }

      return items;
    }

    function updateStatus() {
      movesText.textContent = `步数 ${moves}`;
      matchesText.textContent = `配对 ${matches}/${pairCount}`;
    }

    function updateSetButtons() {
      setButtons.forEach((button) => {
        const active = button.dataset.set === currentSet;
        button.classList.toggle("active", active);
        button.setAttribute("aria-pressed", active ? "true" : "false");
      });
    }

    function showCard(button, card) {
      const visible = card.open || card.matched;
      button.textContent = visible ? card.symbol : "?";
      button.className = `card${card.matched ? " matched" : card.open ? " open" : ""}`;
    }

    function draw() {
      board.innerHTML = "";

      cards.forEach((card, index) => {
        const button = document.createElement("button");
        button.type = "button";
        showCard(button, card);
        button.disabled = locked || card.open || card.matched;
        button.setAttribute("aria-label", card.open || card.matched ? "已翻开的牌" : "隐藏的牌");
        button.addEventListener("click", () => flip(index));
        board.appendChild(button);
      });
    }

    function closePair() {
      cards[first].open = false;
      cards[second].open = false;
      first = null;
      second = null;
      locked = false;
      draw();
    }

    function checkPair() {
      moves += 1;

      if (cards[first].symbol === cards[second].symbol) {
        cards[first].matched = true;
        cards[second].matched = true;
        first = null;
        second = null;
        matches += 1;
      } else {
        locked = true;
        setTimeout(closePair, 500);
      }

      updateStatus();
      draw();
    }

    function flip(index) {
      if (locked || cards[index].open || cards[index].matched) {
        return;
      }

      cards[index].open = true;

      if (first === null) {
        first = index;
      } else {
        second = index;
        checkPair();
      }

      draw();
    }

    function makeNumbers() {
      const numbers = new Set();

      while (numbers.size < pairCount) {
        numbers.add(String(Math.floor(Math.random() * 900) + 100));
      }

      return [...numbers];
    }

    function sample(items) {
      return shuffle([...items]).slice(0, pairCount);
    }

    function getSymbols() {
      if (currentSet === "numbers") {
        return makeNumbers();
      }

      if (currentSet === "chemistry" || currentSet === "surnames") {
        return sample(sets[currentSet]);
      }

      return sets[currentSet];
    }

    function restart() {
      const symbols = getSymbols();
      cards = shuffle([...symbols, ...symbols]).map((symbol) => ({
        symbol,
        open: false,
        matched: false
      }));
      first = null;
      second = null;
      locked = false;
      moves = 0;
      matches = 0;
      updateSetButtons();
      updateStatus();
      draw();
    }

    window.addEventListener("keydown", (event) => {
      if (event.key === " ") {
        restart();
      }
    });

    setButtons.forEach((button) => {
      button.addEventListener("click", () => {
        currentSet = button.dataset.set;
        restart();
      });
    });

    restart();
  </script>
</body>
</html>
