<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>记忆翻牌</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #14213d;
      color: #f7f1e3;
      font-family: Arial, sans-serif;
    }

    main {
      width: min(92vw, 640px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }

    .status {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      color: #d9e2ec;
      font-size: 15px;
    }

    .controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
      color: #d9e2ec;
      font-size: 15px;
    }

    .set-button {
      border: 2px solid #f7f1e3;
      background: #274c77;
      color: #f7f1e3;
      padding: 6px 10px;
      font: 700 15px Arial, sans-serif;
      cursor: pointer;
    }

    .set-button.active {
      background: #fca311;
      color: #14213d;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }

    .card {
      width: 100%;
      min-width: 0;
      aspect-ratio: 1;
      border: 2px solid #f7f1e3;
      background: #274c77;
      color: #f7f1e3;
      font: 700 30px Arial, sans-serif;
      overflow: hidden;
      cursor: pointer;
    }

    .card.number-card {
      font-size: 20px;
      font-variant-numeric: tabular-nums;
    }

    .card.emoji-card {
      font-size: 28px;
      line-height: 1;
    }

    .card.sock-card {
      display: grid;
      place-items: center;
      padding: 0;
    }

    .sock-thumb {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .sock-icon {
      position: relative;
      display: block;
      width: 34%;
      height: 58%;
      border: 3px solid #14213d;
      border-top-width: 8px;
      border-radius: 4px 4px 10px 10px;
      background: var(--sock-color);
      transform: rotate(-12deg);
    }

    .sock-icon::after {
      content: "";
      position: absolute;
      right: -44%;
      bottom: -3px;
      width: 70%;
      height: 34%;
      border: 3px solid #14213d;
      border-left: 0;
      border-radius: 0 12px 12px 0;
      background: inherit;
    }

    .sock-icon.stripe {
      background:
        linear-gradient(
          to bottom,
          var(--sock-color) 0 26%,
          #f7f1e3 26% 38%,
          var(--sock-color) 38% 62%,
          #f7f1e3 62% 74%,
          var(--sock-color) 74% 100%
        );
    }

    .sock-icon.dot {
      background:
        radial-gradient(circle, #f7f1e3 0 18%, transparent 20%) 0 0 / 14px 14px,
        var(--sock-color);
    }

    .sock-icon.cuff {
      border-top-color: #f7f1e3;
    }

    .sock-icon.toe {
      box-shadow: inset 0 -12px 0 #f7f1e3;
    }

    .card:disabled {
      cursor: default;
    }

    .card.open,
    .card.matched {
      background: #fca311;
      color: #14213d;
    }

    .card.open.sock-card,
    .card.matched.sock-card {
      background: #f7f1e3;
    }

    p {
      margin: 12px 0 0;
      color: #d9e2ec;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>记忆翻牌</h1>
    <div class="status" aria-live="polite">
      <span id="moves">步数 0</span>
      <span id="matches">配对 0/18</span>
    </div>
    <div class="controls">
      <span>卡牌类型</span>
      <button class="set-button" type="button" data-set="shapes">形状</button>
      <button class="set-button" type="button" data-set="chemistry">化学</button>
      <button class="set-button" type="button" data-set="numbers">数字</button>
      <button class="set-button active" type="button" data-set="surnames" aria-pressed="true">姓氏</button>
      <button class="set-button" type="button" data-set="socks1">袜子1</button>
      <button class="set-button" type="button" data-set="socks2">袜子2</button>
      <button class="set-button" type="button" data-set="faces">表情</button>
    </div>
    <div id="board" class="board" aria-label="记忆翻牌棋盘"></div>
    <p>每次翻开两张牌，找出所有配对。按空格重新开始。</p>
  </main>

  <script>
    const board = document.getElementById("board");
    const movesText = document.getElementById("moves");
    const matchesText = document.getElementById("matches");
    const setButtons = document.querySelectorAll(".set-button");
    const sets = {
      shapes: ["●", "■", "▲", "◆", "★", "✚", "⬟", "⬢", "○", "□", "△", "◇", "✦", "✖", "⬠", "⬡", "◐", "◧"],
      chemistry: ["H", "He", "Li", "Be", "B", "C", "N", "O", "F", "Ne", "Na", "Mg", "Al", "Si", "P", "S", "Cl", "Ar", "K", "Ca", "Sc", "Ti", "V", "Cr", "Mn", "Fe", "Co", "Ni", "Cu", "Zn", "Ga", "Ge", "As", "Se", "Br", "Kr", "Rb", "Sr", "Y", "Zr", "Nb", "Mo", "Tc", "Ru", "Rh", "Pd", "Ag", "Cd", "In", "Sn", "Sb", "Te", "I", "Xe", "Cs", "Ba", "La", "Ce", "Pr", "Nd", "Pm", "Sm", "Eu", "Gd", "Tb", "Dy", "Ho", "Er", "Tm", "Yb", "Lu", "Hf"],
      surnames: ["王", "李", "张", "刘", "陈", "杨", "黄", "赵", "吴", "周", "徐", "孙", "马", "朱", "胡", "郭", "何", "林", "高", "罗", "郑", "梁", "谢", "宋", "唐", "许", "邓", "冯", "韩", "曹", "曾", "彭", "萧", "蔡", "潘", "田"],
      socks1: ["assets/sock-photo-01-r0.jpg", "assets/sock-photo-01-r90.jpg", "assets/sock-photo-01-r180.jpg", "assets/sock-photo-01-r270.jpg", "assets/sock-photo-02-r0.jpg", "assets/sock-photo-02-r90.jpg", "assets/sock-photo-02-r180.jpg", "assets/sock-photo-02-r270.jpg", "assets/sock-photo-03-r0.jpg", "assets/sock-photo-03-r90.jpg", "assets/sock-photo-03-r180.jpg", "assets/sock-photo-03-r270.jpg", "assets/sock-photo-04-r0.jpg", "assets/sock-photo-04-r90.jpg", "assets/sock-photo-04-r180.jpg", "assets/sock-photo-04-r270.jpg", "assets/sock-photo-05-r0.jpg", "assets/sock-photo-05-r90.jpg", "assets/sock-photo-05-r180.jpg", "assets/sock-photo-05-r270.jpg", "assets/sock-photo-06-r0.jpg", "assets/sock-photo-06-r90.jpg", "assets/sock-photo-06-r180.jpg", "assets/sock-photo-06-r270.jpg"],
      socks2: ["#e63946|solid", "#4361ee|solid", "#2a9d8f|solid", "#f77f00|solid", "#6c757d|solid", "#9b5de5|solid", "#ef476f|solid", "#118ab2|solid", "#e63946|stripe", "#4361ee|stripe", "#2a9d8f|stripe", "#f77f00|stripe", "#6c757d|stripe", "#9b5de5|stripe", "#ef476f|stripe", "#118ab2|stripe", "#e63946|dot", "#4361ee|dot", "#2a9d8f|dot", "#f77f00|dot", "#6c757d|dot", "#9b5de5|dot", "#ef476f|dot", "#118ab2|dot", "#e63946|cuff", "#4361ee|cuff", "#2a9d8f|cuff", "#f77f00|cuff", "#6c757d|cuff", "#9b5de5|cuff", "#ef476f|cuff", "#118ab2|cuff", "#e63946|toe", "#4361ee|toe", "#2a9d8f|toe", "#f77f00|toe"],
      faces: ["😀", "😃", "😄", "😁", "😆", "😅", "😂", "🙂", "🙃", "😉", "😊", "😇", "😍", "😘", "😜", "🤪", "🤔", "🤨", "😐", "😑", "😴", "😬", "😮", "😱", "😎", "🥳", "😡", "😭", "🤯", "🤠", "🤖", "👻", "💀", "👽", "🤡", "🥶"]
    };
    const pairCount = 18;
    let cards = [];
    let first = null;
    let second = null;
    let locked = false;
    let moves = 0;
    let matches = 0;
    let currentSet = "surnames";

    function shuffle(items) {
      for (let index = items.length - 1; index > 0; index -= 1) {
        const swap = Math.floor(Math.random() * (index + 1));
        [items[index], items[swap]] = [items[swap], items[index]];
      }

      return items;
    }

    function updateStatus() {
      movesText.textContent = `步数 ${moves}`;
      matchesText.textContent = `配对 ${matches}/${pairCount}`;
    }

    function updateSetButtons() {
      setButtons.forEach((button) => {
        const active = button.dataset.set === currentSet;
        button.classList.toggle("active", active);
        button.setAttribute("aria-pressed", active ? "true" : "false");
      });
    }

    function showCard(button, card) {
      const visible = card.open || card.matched;
      button.textContent = visible ? card.symbol : "?";
      button.className = `card${card.matched ? " matched" : card.open ? " open" : ""}`;

      if (currentSet === "numbers") {
        button.classList.add("number-card");
      }

      if (currentSet === "faces") {
        button.classList.add("emoji-card");
      }

      if (visible && currentSet === "socks1") {
        const image = document.createElement("img");
        button.textContent = "";
        button.classList.add("sock-card");
        image.className = "sock-thumb";
        image.src = card.symbol;
        image.alt = "";
        button.appendChild(image);
      }

      if (visible && currentSet === "socks2") {
        const [color, pattern] = card.symbol.split("|");
        const icon = document.createElement("span");
        button.textContent = "";
        button.classList.add("sock-card");
        icon.className = `sock-icon ${pattern}`;
        icon.style.setProperty("--sock-color", color);
        button.appendChild(icon);
      }
    }

    function draw() {
      board.innerHTML = "";

      cards.forEach((card, index) => {
        const button = document.createElement("button");
        button.type = "button";
        showCard(button, card);
        button.disabled = locked || card.open || card.matched;
        button.setAttribute("aria-label", card.open || card.matched ? (currentSet === "socks1" || currentSet === "socks2" ? "袜子图案" : "已翻开的牌") : "隐藏的牌");
        button.addEventListener("click", () => flip(index));
        board.appendChild(button);
      });
    }

    function closePair() {
      cards[first].open = false;
      cards[second].open = false;
      first = null;
      second = null;
      locked = false;
      draw();
    }

    function checkPair() {
      moves += 1;

      if (cards[first].symbol === cards[second].symbol) {
        cards[first].matched = true;
        cards[second].matched = true;
        first = null;
        second = null;
        matches += 1;
      } else {
        locked = true;
        setTimeout(closePair, 500);
      }

      updateStatus();
      draw();
    }

    function flip(index) {
      if (locked || cards[index].open || cards[index].matched) {
        return;
      }

      cards[index].open = true;

      if (first === null) {
        first = index;
      } else {
        second = index;
        checkPair();
      }

      draw();
    }

    function makeNumbers() {
      const numbers = new Set();

      while (numbers.size < pairCount) {
        numbers.add(String(Math.floor(Math.random() * 900) + 100));
      }

      return [...numbers];
    }

    function sample(items) {
      return shuffle([...items]).slice(0, pairCount);
    }

    function getSymbols() {
      if (currentSet === "numbers") {
        return makeNumbers();
      }

      if (currentSet === "chemistry" || currentSet === "surnames" || currentSet === "socks1" || currentSet === "socks2" || currentSet === "faces") {
        return sample(sets[currentSet]);
      }

      return sets[currentSet];
    }

    function restart() {
      const symbols = getSymbols();
      cards = shuffle([...symbols, ...symbols]).map((symbol) => ({
        symbol,
        open: false,
        matched: false
      }));
      first = null;
      second = null;
      locked = false;
      moves = 0;
      matches = 0;
      updateSetButtons();
      updateStatus();
      draw();
    }

    window.addEventListener("keydown", (event) => {
      if (event.key === " ") {
        restart();
      }
    });

    setButtons.forEach((button) => {
      button.addEventListener("click", () => {
        currentSet = button.dataset.set;
        restart();
      });
    });

    restart();
  </script>
</body>
</html>
