<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>记忆翻牌</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #14213d;
      color: #f7f1e3;
      font-family: Arial, sans-serif;
    }

    main {
      width: min(92vw, 640px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }

    .status {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      color: #d9e2ec;
      font-size: 15px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }

    button {
      aspect-ratio: 1;
      border: 2px solid #f7f1e3;
      background: #274c77;
      color: #f7f1e3;
      font: 700 30px Arial, sans-serif;
      cursor: pointer;
    }

    button:disabled {
      cursor: default;
    }

    button.open,
    button.matched {
      background: #fca311;
      color: #14213d;
    }

    p {
      margin: 12px 0 0;
      color: #d9e2ec;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>记忆翻牌</h1>
    <div class="status" aria-live="polite">
      <span id="moves">步数 0</span>
      <span id="matches">配对 0/18</span>
    </div>
    <div id="board" class="board" aria-label="记忆翻牌棋盘"></div>
    <p>每次翻开两张牌，找出所有配对。按空格重新开始。</p>
  </main>

  <script>
    const board = document.getElementById("board");
    const movesText = document.getElementById("moves");
    const matchesText = document.getElementById("matches");
    const symbols = ["A", "B", "C", "D", "E", "F", "G", "H", "J", "K", "L", "M", "N", "P", "Q", "R", "S", "T"];
    let cards = [];
    let first = null;
    let second = null;
    let locked = false;
    let moves = 0;
    let matches = 0;

    function shuffle(items) {
      for (let index = items.length - 1; index > 0; index -= 1) {
        const swap = Math.floor(Math.random() * (index + 1));
        [items[index], items[swap]] = [items[swap], items[index]];
      }

      return items;
    }

    function updateStatus() {
      movesText.textContent = `步数 ${moves}`;
      matchesText.textContent = `配对 ${matches}/${symbols.length}`;
    }

    function draw() {
      board.innerHTML = "";

      cards.forEach((card, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = card.open || card.matched ? card.symbol : "?";
        button.className = card.matched ? "matched" : card.open ? "open" : "";
        button.disabled = locked || card.open || card.matched;
        button.setAttribute("aria-label", card.open || card.matched ? `牌 ${card.symbol}` : "隐藏的牌");
        button.addEventListener("click", () => flip(index));
        board.appendChild(button);
      });
    }

    function closePair() {
      cards[first].open = false;
      cards[second].open = false;
      first = null;
      second = null;
      locked = false;
      draw();
    }

    function checkPair() {
      moves += 1;

      if (cards[first].symbol === cards[second].symbol) {
        cards[first].matched = true;
        cards[second].matched = true;
        first = null;
        second = null;
        matches += 1;
      } else {
        locked = true;
        setTimeout(closePair, 500);
      }

      updateStatus();
      draw();
    }

    function flip(index) {
      if (locked || cards[index].open || cards[index].matched) {
        return;
      }

      cards[index].open = true;

      if (first === null) {
        first = index;
      } else {
        second = index;
        checkPair();
      }

      draw();
    }

    function restart() {
      cards = shuffle([...symbols, ...symbols]).map((symbol) => ({
        symbol,
        open: false,
        matched: false
      }));
      first = null;
      second = null;
      locked = false;
      moves = 0;
      matches = 0;
      updateStatus();
      draw();
    }

    window.addEventListener("keydown", (event) => {
      if (event.key === " ") {
        restart();
      }
    });

    restart();
  </script>
</body>
</html>
